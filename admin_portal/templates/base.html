<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Admin Portal" }}</title>
    <!-- Bootstrap CSS (via CDN for simplicity) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KzZiA5odmP7RLkG+iO6gyqM/3MDtKN6mO7ierrauCIXt+Z3VHyYilhdP5Zo-lQXJ" crossorigin="anonymous">
    {% if request.url_path_for %}
        <link href="{{ url_for('static', path='admin.css') }}" rel="stylesheet">
    {% endif %}
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Diabetes Diet Manager – Admin Portal</a>
        {% if request.session.get('token') %}
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Users</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>
            </ul>
        </div>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-mQ93S8Z4nPHG/+bexdFv+Fr5jBqFa9UcRgxN6E466+vWXT14FRentM8Nl1N8I2c2" crossorigin="anonymous"></script>
</body>
</html>
